<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 家庭服务器管理面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0b0f19;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas#bgCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      width: 800px;
      max-width: 95vw;
      background: rgba(15, 23, 42, 0.92);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(24px);
      border: 1px solid rgba(99, 102, 241, 0.2);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    /* 左侧品牌区 */
    .login-brand {
      flex: 1;
      background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      text-align: center;
      border-right: 1px solid rgba(99, 102, 241, 0.15);
    }

    .login-brand svg {
      margin-bottom: 24px;
    }

    .login-brand h2 {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .login-brand p {
      color: rgba(148, 163, 184, 0.7);
      font-size: 13px;
      line-height: 1.6;
    }

    .login-features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
      justify-content: center;
    }

    .login-features span {
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
    }

    /* 右侧登录表单 */
    .login-form-area {
      width: 360px;
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-form-area h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .login-form-area .subtitle {
      color: rgba(148, 163, 184, 0.6);
      font-size: 13px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(71, 85, 105, 0.4);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      background: rgba(30, 41, 59, 0.9);
    }

    .form-input::placeholder {
      color: rgba(148, 163, 184, 0.3);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      color: #f87171;
      font-size: 12px;
      margin-top: 8px;
      min-height: 20px;
      text-align: center;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(148, 163, 184, 0.4);
      font-size: 11px;
    }

    /* 响应式 */
    @media (max-width: 640px) {
      .login-wrapper {
        flex-direction: column;
        width: 360px;
      }
      .login-brand {
        padding: 32px 24px;
        border-right: none;
        border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      }
      .login-form-area {
        width: 100%;
        padding: 32px 28px;
      }
    }

    /* 加载动画 */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="login-wrapper">
    <!-- 左侧品牌 -->
    <div class="login-brand">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="56" y2="56">
            <stop offset="0" stop-color="#6366f1"/>
            <stop offset="1" stop-color="#818cf8"/>
          </linearGradient>
        </defs>
        <rect width="56" height="56" rx="14" fill="url(#lg)"/>
        <path d="M28 10v36M10 28h36M16 16l24 24M40 16L16 40" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
        <circle cx="28" cy="28" r="7" fill="white" opacity="0.9"/>
      </svg>
      <h2>家庭服务器管理面板</h2>
      <p>一站式管理 DDNS · SSL · Nginx<br>反向代理 · 端口 · 通知</p>
      <div class="login-features">
        <span>📡 DDNS</span><span>🔒 SSL</span><span>🌐 Nginx</span>
        <span>🔄 代理</span><span>🔌 端口</span><span>📢 通知</span>
      </div>
    </div>

    <!-- 右侧登录 -->
    <div class="login-form-area">
      <h1>管理员登录</h1>
      <p class="subtitle">请输入账号密码进入管理面板</p>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label>账号</label>
          <input type="text" id="username" class="form-input" placeholder="admin" autocomplete="off" autofocus>
        </div>
        <div class="form-group">
          <label>密码</label>
          <div style="position:relative">
            <input type="password" id="password" class="form-input" placeholder="输入密码" style="padding-right:44px">
            <button type="button" id="togglePwd" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:8px;font-size:16px;color:#94a3b8;line-height:1;border-radius:6px;transition:all 0.2s" title="显示密码">👁</button>
          </div>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" class="btn-login" id="loginBtn">登录</button>
      </form>

      <div class="login-footer">Home Server Panel v1.4.0</div>
    </div>
  </div>

  <script>
    // Canvas 背景动画
    (function() {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles = [], animId;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // 粒子
      function createParticles() {
        particles = [];
        const count = Math.min(Math.floor(w * h / 12000), 80);
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            r: Math.random() * 2 + 1,
            alpha: Math.random() * 0.4 + 0.2
          });
        }
      }
      createParticles();
      window.addEventListener('resize', createParticles);

      function draw() {
        if (document.hidden) { animId = requestAnimationFrame(draw); return; }

        ctx.clearRect(0, 0, w, h);

        // 网格
        ctx.strokeStyle = 'rgba(99, 102, 241, 0.04)';
        ctx.lineWidth = 1;
        const grid = 50;
        for (let x = 0; x < w; x += grid) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
        for (let y = 0; y < h; y += grid) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

        // 粒子
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > w) p.vx *= -1;
          if (p.y < 0 || p.y > h) p.vy *= -1;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(129, 140, 248, ${p.alpha})`;
          ctx.fill();
        });

        // 连线（近距离粒子之间）
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(99, 102, 241, ${0.08 * (1 - dist / 120)})`;
              ctx.stroke();
            }
          }
        }

        animId = requestAnimationFrame(draw);
      }
      draw();

      // 页面不可见时暂停
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(animId);
        else animId = requestAnimationFrame(draw);
      });
    })();

    // 登录逻辑
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorEl.textContent = '请输入账号和密码';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>登录中...';
      errorEl.textContent = '';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (data.success) {
          // 存储 token
          localStorage.setItem('hsp_token', data.data.token);
          // 跳转主页
          window.location.href = '/';
        } else {
          errorEl.textContent = data.message || '登录失败';
          btn.disabled = false;
          btn.textContent = '登录';
        }
      } catch (err) {
        errorEl.textContent = '网络错误，请重试';
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });

    // 密码显示切换
    const togglePwd = document.getElementById('togglePwd');
    const pwdInput = document.getElementById('password');
    togglePwd.addEventListener('click', () => {
      const isPassword = pwdInput.type === 'password';
      pwdInput.type = isPassword ? 'text' : 'password';
      togglePwd.textContent = isPassword ? '🙈' : '👁';
      togglePwd.title = isPassword ? '隐藏密码' : '显示密码';
    });

    // 回车登录
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
