<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 家庭服务器管理面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 背景：全屏 Canvas 动画层 */
    #bgCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      width: 820px;
      max-width: 95vw;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0,0,0,0.04);
    }

    /* 左侧品牌区 */
    .login-brand {
      flex: 1;
      background: linear-gradient(135deg, #fef9f0 0%, #fef3c7 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      text-align: center;
      border-right: 1px solid rgba(184, 134, 11, 0.1);
    }

    .login-brand svg {
      margin-bottom: 20px;
    }

    .login-brand h2 {
      color: #1a1a1a;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .login-brand .brand-en {
      color: #b8860b;
      font-size: 11px;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .login-brand p {
      color: rgba(0,0,0,0.45);
      font-size: 13px;
      line-height: 1.6;
    }

    .login-features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
      justify-content: center;
    }

    .login-features span {
      background: rgba(184, 134, 11, 0.1);
      color: #b8860b;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    /* 右侧登录表单 */
    .login-form-area {
      width: 380px;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-form-area h1 {
      color: #1a1a1a;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .login-form-area .subtitle {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #6b7280;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: #f8f9fa;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      color: #1a1a1a;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: #b8860b;
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.12);
      background: #fff;
    }

    .form-input::placeholder {
      color: rgba(0,0,0,0.2);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #b8860b, #daa520);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(184, 134, 11, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      color: #c41e3a;
      font-size: 12px;
      margin-top: 8px;
      min-height: 20px;
      text-align: center;
      font-weight: 500;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: #d1d5db;
      font-size: 11px;
    }

    /* 响应式 */
    @media (max-width: 700px) {
      .login-wrapper {
        flex-direction: column;
        width: 380px;
      }
      .login-brand {
        padding: 32px 24px;
        border-right: none;
        border-bottom: 1px solid rgba(184, 134, 11, 0.1);
      }
      .login-form-area {
        width: 100%;
        padding: 32px 28px;
      }
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 2K / 4K 适配 */
    @media (min-width: 1800px) {
      .login-form-wrapper { max-width: 520px; padding: 48px 44px; }
      .login-title { font-size: 28px; }
      .login-features { gap: 20px; }
      .feature-item { font-size: 15px; }
    }
    @media (min-width: 2560px) {
      .login-form-wrapper { max-width: 580px; padding: 56px 52px; }
      .login-title { font-size: 32px; }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="login-wrapper">
    <!-- 左侧品牌 -->
    <div class="login-brand">
      <!-- SVG Logo: server icon with gold + red accents -->
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="66" height="66" rx="18" fill="url(#loginLogoBg)" stroke="#b8860b" stroke-width="2.5"/>
        <!-- Server rack bars -->
        <rect x="18" y="24" width="36" height="5" rx="2.5" fill="#1a1a1a" opacity="0.45"/>
        <rect x="18" y="33" width="36" height="5" rx="2.5" fill="#1a1a1a" opacity="0.25"/>
        <rect x="18" y="42" width="22" height="5" rx="2.5" fill="#c41e3a" opacity="0.65"/>
        <!-- Status indicators -->
        <circle cx="32" cy="16" r="4.5" fill="#b8860b"/>
        <circle cx="46" cy="16" r="3.5" fill="#c41e3a"/>
        <defs>
          <linearGradient id="loginLogoBg" x1="0" y1="0" x2="72" y2="72">
            <stop offset="0" stop-color="#fff8e7"/>
            <stop offset="1" stop-color="#fef3c7"/>
          </linearGradient>
        </defs>
      </svg>
      <h2>家庭服务器管理面板</h2>
      <div class="brand-en">HOME SERVER PANEL</div>
      <p>一站式管理 DDNS · SSL · Nginx<br>反向代理 · 端口 · 通知 · 进程</p>
      <div class="login-features">
        <span>📡 DDNS</span><span>🔒 SSL</span><span>🌐 Nginx</span>
        <span>🔄 代理</span><span>🔌 端口</span><span>⚙️ 系统</span>
      </div>
    </div>

    <!-- 右侧登录 -->
    <div class="login-form-area">
      <h1>管理员登录</h1>
      <p class="subtitle">请输入账号密码进入管理面板</p>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label>账号</label>
          <input type="text" id="username" class="form-input" placeholder="admin" autocomplete="off" autofocus>
        </div>
        <div class="form-group">
          <label>密码</label>
          <div style="position:relative">
            <input type="password" id="password" class="form-input" placeholder="输入密码" style="padding-right:44px">
            <button type="button" id="togglePwd" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:8px;font-size:16px;color:#9ca3af;line-height:1;border-radius:6px;transition:all 0.2s" title="显示密码">👁</button>
          </div>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" class="btn-login" id="loginBtn">登 录</button>
      </form>

      <div class="login-footer">Home Server Panel v1.17.7</div>
    </div>
  </div>

  <script>
    // === 动态粒子网络背景 ===
    (function() {
      var c = document.getElementById('bgCanvas');
      var ctx = c.getContext('2d');
      var w, h, particles = [], MAX = 80;
      var mouseX = -1000, mouseY = -1000;

      function resize() {
        w = c.width = window.innerWidth;
        h = c.height = window.innerHeight;
        initParticles();
      }

      function initParticles() {
        particles = [];
        for (var i = 0; i < MAX; i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.6,
            vy: (Math.random() - 0.5) * 0.6,
            r: Math.random() * 2 + 1,
            o: Math.random() * 0.5 + 0.3,
            type: Math.random() < 0.15 ? 'gold' : (Math.random() < 0.2 ? 'red' : 'dark')
          });
        }
      }

      function draw() {
        if (document.hidden) { requestAnimationFrame(draw); return; }

        ctx.clearRect(0, 0, w, h);

        // 深色网格背景
        ctx.strokeStyle = 'rgba(184, 134, 11, 0.03)';
        ctx.lineWidth = 0.5;
        var gap = 60;
        for (var x = 0; x < w; x += gap) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
        for (var y = 0; y < h; y += gap) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

        // 更新 & 绘制粒子
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;

          // 鼠标吸引
          var dx = mouseX - p.x, dy = mouseY - p.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            p.vx += dx / dist * 0.02;
            p.vy += dy / dist * 0.02;
          }

          // 速度摩擦
          p.vx *= 0.999;
          p.vy *= 0.999;

          var color;
          if (p.type === 'gold') color = 'rgba(184,134,11,' + p.o + ')';
          else if (p.type === 'red') color = 'rgba(196,30,58,' + p.o + ')';
          else color = 'rgba(156,163,175,' + p.o + ')';

          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();

          // 发光
          ctx.fillStyle = color.replace(/[\d.]+(?=\))/, '0.15');
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
          ctx.fill();
        }

        // 近距离连线
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d < 120) {
              var alpha = (1 - d / 120) * 0.15;
              ctx.strokeStyle = 'rgba(184,134,11,' + alpha + ')';
              ctx.lineWidth = 0.5;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        // 浮动数据流线条
        var t = Date.now() * 0.001;
        for (var i = 0; i < 5; i++) {
          var lx = ((Math.sin(t * 0.3 + i * 1.3) + 1) * 0.5) * w;
          var ly = ((Math.cos(t * 0.25 + i * 1.7) + 1) * 0.5) * h;
          ctx.strokeStyle = 'rgba(196,30,58,0.06)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(lx - 40, ly);
          ctx.lineTo(lx + 40, ly);
          ctx.stroke();
          ctx.strokeStyle = 'rgba(196,30,58,0.03)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(lx, ly, 25, 0, Math.PI * 2);
          ctx.stroke();
        }

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      document.addEventListener('mousemove', function(e) { mouseX = e.clientX; mouseY = e.clientY; });
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) requestAnimationFrame(draw);
      });

      resize();
      requestAnimationFrame(draw);
    })();

    // 登录逻辑
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorEl.textContent = '请输入账号和密码';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>登录中...';
      errorEl.textContent = '';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (data.success) {
          localStorage.setItem('hsp_token', data.data.token);
          window.location.href = '/';
        } else {
          errorEl.textContent = data.message || '登录失败';
          btn.disabled = false;
          btn.textContent = '登 录';
        }
      } catch (err) {
        errorEl.textContent = '网络错误，请重试';
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    });

    // 密码显示切换
    var togglePwd = document.getElementById('togglePwd');
    var pwdInput = document.getElementById('password');
    togglePwd.addEventListener('click', function() {
      var isPassword = pwdInput.type === 'password';
      pwdInput.type = isPassword ? 'text' : 'password';
      togglePwd.textContent = isPassword ? '🙈' : '👁';
      togglePwd.title = isPassword ? '隐藏密码' : '显示密码';
    });

    // 回车登录
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
